name: build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Every push / PR: prove main compiles and hand back a debug APK to grab.
  debug:
    name: Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: nomad-remote-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # Tag push (v1.2.3) on the canonical repo only: build a SIGNED release APK and
  # publish it as a GitHub Release. Skipped on forks (no secrets) and on branches.
  release:
    name: Signed release
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'WarDrake/Nomad-ND1-RC'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Derive version from tag
        id: ver
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease --stacktrace \
            -PversionCode=${{ github.run_number }} \
            -PversionName=${{ steps.ver.outputs.name }}

      - name: Stage APK with a friendly name
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
            "dist/Nomad-Remote-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Nomad-Remote-*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
